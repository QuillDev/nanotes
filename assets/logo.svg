<svg width="360" height="140" viewBox="0 0 360 140" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="NaNotes">
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#16161b"/>
      <stop offset="1" stop-color="#0a0a0d"/>
    </linearGradient>
    <linearGradient id="pink" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff9ebd"/>
      <stop offset="1" stop-color="#f65c8e"/>
    </linearGradient>
  </defs>

  <!-- Self-contained dark panel so the mark reads on both light and dark READMEs -->
  <rect x="1" y="1" width="358" height="138" rx="26" fill="url(#panel)" stroke="#27272f" stroke-width="1.5"/>

  <!-- "Na" tile: hiragana な, the app's icon glyph -->
  <rect x="28" y="28" width="84" height="84" rx="20" fill="#0a0a0d" stroke="url(#pink)" stroke-width="2.5"/>
  <text x="70" y="71" text-anchor="middle" dominant-baseline="central"
        font-family="'Hiragino Kaku Gothic ProN','Hiragino Sans','Yu Gothic','Noto Sans JP','Meiryo',sans-serif"
        font-size="50" font-weight="600" fill="url(#pink)">な</text>

  <!-- Wordmark -->
  <text x="134" y="71" dominant-baseline="central"
        font-family="'JetBrains Mono','SFMono-Regular',ui-monospace,Menlo,Consolas,monospace"
        font-size="40" font-weight="700" fill="#e8e9ee">Notes</text>
</svg>
